<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>용돈 서프라이즈 파트너</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { font-family: 'Noto Sans KR', sans-serif; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100dvh; margin: 0; overflow: hidden; background: #fff; position: fixed; width: 100%; }
        
        /* 가로 모드 안내 */
        @media (orientation: portrait) { #rotate-overlay { display: flex !important; } }
        #rotate-overlay { display: none; position: fixed; inset: 0; background: #fff; z-index: 9999; flex-direction: column; align-items: center; justify-content: center; }

        .page { display: none; width: 100%; height: 100dvh; flex-direction: column; align-items: center; justify-content: center; padding: 20px; position: absolute; }
        .page.active { display: flex; }
        
        /* 입력창 한 줄 나열 (가로 최적화) */
        .input-row { display: flex; gap: 12px; width: 100%; max-width: 900px; margin-bottom: 20px; }
        .input-group { flex: 1; }
        .custom-input { width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 12px; outline: none; transition: all 0.2s; font-size: 15px; background: #f8fafc; }
        .custom-input:focus { border-color: #3b82f6; background: #fff; }

        /* [핵심] 스크린샷 키패드 UI 재현 */
        .keypad-container { width: 100%; max-width: 280px; display: flex; flex-direction: column; align-items: center; }
        .pin-dot { width: 16px; height: 16px; border-radius: 50%; border: 2px solid #5c7cff; background: transparent; transition: all 0.2s; }
        .pin-dot.filled { background: #5c7cff; }

        .numpad-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; margin-bottom: 20px; }
        .num-btn { 
            background: #f0f4f8; border-radius: 12px; height: 70px; 
            font-size: 28px; font-weight: 800; color: #1e293b;
            display: flex; align-items: center; justify-content: center; transition: all 0.1s;
        }
        .num-btn:active { background: #e2e8f0; transform: scale(0.95); }
        
        /* 하단 파란색 버튼 */
        .btn-submit { 
            background: #5c7cff; color: white; border-radius: 16px; 
            width: 100%; padding: 18px 0; font-size: 20px; font-weight: 700; 
            box-shadow: 0 4px 12px rgba(92, 124, 255, 0.3);
        }
        .btn-submit:active { transform: scale(0.97); opacity: 0.9; }

        canvas { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 100; }
    </style>
</head>
<body>

    <div id="rotate-overlay">
        <div class="text-6xl mb-6">📱🔄</div>
        <p class="text-2xl font-bold">화면을 가로로 돌려주세요</p>
    </div>

    <canvas id="confetti-canvas"></canvas>

    <div id="page1" class="page active">
        <div class="text-center mb-6">
            <span class="text-4xl">🎁</span>
            <h1 class="text-2xl font-black mt-2 text-slate-800">용돈 서프라이즈 만들기</h1>
        </div>
        <div class="input-row">
            <div class="input-group"><label class="block text-xs font-bold mb-1 text-slate-500">받는 사람 이름</label><input id="inName" class="custom-input" placeholder="예) 엄마, 이순자"></div>
            <div class="input-group"><label class="block text-xs font-bold mb-1 text-slate-500">이벤트명</label><input id="inEvent" class="custom-input" placeholder="예) 생일, 환갑"></div>
            <div class="input-group"><label class="block text-xs font-bold mb-1 text-slate-500">준비한 사람</label><input id="inFrom" class="custom-input" placeholder="예) 아들, 딸, 이하늘"></div>
        </div>
        <div class="w-full max-w-[900px] mb-8">
            <label class="block text-xs font-bold mb-1 text-slate-500">마지막 메시지</label>
            <input id="inMsg" class="custom-input" placeholder="예) 용돈에 만족하셨으면 안아주세요:), 건강하고 행복하세요~">
        </div>
        <button onclick="startApp()" class="btn-submit !w-[300px]">서프라이즈 시작하기</button>
    </div>

    <div id="page2" class="page bg-slate-50">
        <div class="text-center px-10">
            <p id="p2Text" class="text-3xl font-black leading-tight mb-14 text-slate-800"></p>
            <button onclick="goToPage(3)" class="btn-submit !w-[250px] !text-2xl">출금하기</button>
        </div>
    </div>

    <div id="page3" class="page">
        <div class="keypad-container">
            <h2 class="text-xl font-black mb-4">비밀번호를 입력하세요</h2>
            <div class="flex gap-4 mb-10">
                <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
                <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
            </div>
            
            <div class="numpad-grid">
                <button class="num-btn" onclick="pressKey('1')">1</button>
                <button class="num-btn" onclick="pressKey('2')">2</button>
                <button class="num-btn" onclick="pressKey('3')">3</button>
                <button class="num-btn" onclick="pressKey('4')">4</button>
                <button class="num-btn" onclick="pressKey('5')">5</button>
                <button class="num-btn" onclick="pressKey('6')">6</button>
                <button class="num-btn" onclick="pressKey('7')">7</button>
                <button class="num-btn" onclick="pressKey('8')">8</button>
                <button class="num-btn" onclick="pressKey('9')">9</button>
                <button class="num-btn" onclick="pressKey('*')">*</button>
                <button class="num-btn" onclick="pressKey('0')">0</button>
                <button class="num-btn" onclick="clearPin()">
                    <i data-lucide="delete"></i>
                </button>
            </div>
            
            <button class="btn-submit" onclick="finishPin()">입력완료</button>
        </div>
    </div>

    <div id="page4" class="page">
        <div id="waiting" class="text-center">
            <div class="text-8xl mb-6 animate-bounce">💳</div>
            <h2 class="text-3xl font-black text-slate-800">용돈 출금을 위해서<br>카드를 넣어주세요</h2>
            <div class="mt-8 flex flex-col items-center">
                <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                <p class="mt-4 text-slate-400 font-bold">보안 연결 중... (10초)</p>
            </div>
        </div>
        <div id="final" class="hidden text-center scale-125">
            <h1 id="finalMsg" class="text-4xl font-black text-blue-600 leading-tight"></h1>
            <p class="text-xl text-slate-500 mt-6 font-bold">용돈이 출금이 되었습니다 🥳</p>
        </div>
    </div>

    <script>
        let pin = "";
        let config = {};

        function goToPage(num) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page' + num).classList.add('active');
            if(num >= 2) {
                const el = document.documentElement;
                if(el.requestFullscreen) el.requestFullscreen().catch(()=>{});
                else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();
            }
        }

        function startApp() {
            config = {
                name: document.getElementById('inName').value,
                event: document.getElementById('inEvent').value,
                from: document.getElementById('inFrom').value,
                msg: document.getElementById('inMsg').value
            };
            if(!config.name || !config.event) return alert("필수 정보를 입력하세요!");
            document.getElementById('p2Text').innerHTML = `<span class="text-blue-600">${config.name}</span>의 <span class="text-blue-600">${config.event}</span> 기념으로<br><span class="text-blue-600">${config.from}</span>님이 용돈 서비스를 준비하셨습니다`;
            goToPage(2);
        }

        function pressKey(n) { if(pin.length < 6) { pin += n; updateDots(); } }
        function clearPin() { pin = pin.slice(0, -1); updateDots(); }
        function updateDots() {
            const dots = document.querySelectorAll('.pin-dot');
            dots.forEach((d, i) => i < pin.length ? d.classList.add('filled') : d.classList.remove('filled'));
        }

        function finishPin() {
            if(pin.length === 0) return;
            goToPage(4);
            setTimeout(() => {
                document.getElementById('waiting').classList.add('hidden');
                document.getElementById('final').classList.remove('hidden');
                document.getElementById('finalMsg').innerText = config.msg || "축하합니다!";
                startInfiniteConfetti();
            }, 10000);
        }

        // 3D 무한 컨페티 엔진
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const colors = ['#2563eb', '#f59e0b', '#ef4444', '#10b981', '#8b5cf6', '#ec4899'];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() > 0.4 ? window.innerWidth / 2 : Math.random() * window.innerWidth;
                this.y = Math.random() > 0.4 ? window.innerHeight / 2 : Math.random() * window.innerHeight;
                this.size = Math.random() * 8 + 4;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.vx = (Math.random() - 0.5) * 20;
                this.vy = (Math.random() - 0.5) * 20;
                this.opacity = 1;
                this.gravity = 0.15;
            }
            update() {
                this.vx *= 0.99; this.vy += this.gravity; this.x += this.vx; this.y += this.vy; this.opacity -= 0.008;
                if (this.opacity <= 0) this.reset();
            }
            draw() {
                ctx.fillStyle = this.color; ctx.globalAlpha = this.opacity;
                ctx.beginPath();
                if(Math.random() > 0.5) ctx.arc(this.x, this.y, this.size/2, 0, Math.PI*2);
                else ctx.fillRect(this.x, this.y, this.size, this.size);
                ctx.fill();
            }
        }

        function startInfiniteConfetti() {
            for(let i=0; i<150; i++) particles.push(new Particle());
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => { p.update(); p.draw(); });
                requestAnimationFrame(animate);
            }
            animate();
        }

        // 아이콘 초기화
        lucide.createIcons();
    </script>
</body>
</html>
